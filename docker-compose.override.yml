# =============================================================================
# Docker Compose Override for Development
# All development operations run inside containers
# =============================================================================

services:
  # Backend development service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder  # Use builder stage which has dev dependencies
    volumes:
      # Mount source code for live reload
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      # Named volume for virtual environment to persist between restarts
      - backend-venv:/app/.venv
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    develop:
      watch:
        # Sync Python source changes
        - path: ./backend/app
          target: /app/backend/app
          action: sync
        # Rebuild on dependency changes
        - path: ./backend/pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild

  # Frontend development service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app/frontend
      # Named volume for node_modules to avoid bind mount issues
      - frontend-node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    develop:
      watch:
        # Sync source changes
        - path: ./frontend/src
          target: /app/frontend/src
          action: sync
        - path: ./frontend/index.html
          target: /app/frontend/index.html
          action: sync
        # Rebuild on package changes
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/pnpm-lock.yaml
          action: rebuild

  # Celery worker for development
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - backend-venv:/app/.venv
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - ENVIRONMENT=development
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis

  # Celery beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - backend-venv:/app/.venv
    command: celery -A app.celery_app beat --scheduler redbeat.RedBeatScheduler --loglevel=info
    environment:
      - ENVIRONMENT=development
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis

  # Flower for Celery monitoring
  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - backend-venv:/app/.venv
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis://redis:6379/0
    depends_on:
      - redis

volumes:
  backend-venv:
  frontend-node_modules:
